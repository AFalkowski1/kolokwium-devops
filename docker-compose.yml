services:
  app:
    build: .
    networks:
      - back-net
    environment:
      - FLASK_APP=app.main
      - DB_PATH=/data/app.db
    volumes:
      - dbdata:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - back-net
    depends_on:
      app:
        condition: service_healthy

volumes:
  dbdata:

networks:
  back-net: